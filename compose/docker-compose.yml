services:
  floribot-base:
    profiles: ["robot", "base"]
    build:
      context: ..
      dockerfile: base/Dockerfile
    container_name: floribot-base
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    command:
      - bash
      - -lc
      - |
          ros2 launch plc_connection plc_connection_launch.py &
          exec ros2 launch base base_node.launch.py
    restart: unless-stopped

  floribot-base-sim:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: base/Dockerfile
    container_name: floribot-base-sim
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    command:
      - bash
      - -lc
      - |
          exec ros2 launch base base_node.launch.py
    restart: unless-stopped

  floribot-sensors:
    profiles: ["robot", "sensors"]
    build:
      context: ..
      dockerfile: sensors/Dockerfile
    container_name: floribot-sensors
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}

      SICK_LAUNCH_FILE: ${SICK_LAUNCH_FILE:-sick_tim_5xx.launch.py}
      SICK_FRONT_IP: ${SICK_FRONT_IP:-192.168.0.51}
      SICK_REAR_IP: ${SICK_REAR_IP:-192.168.0.52}
      SICK_FRONT_FRAME: ${SICK_FRONT_FRAME:-sick_front_link}
      SICK_REAR_FRAME: ${SICK_REAR_FRAME:-sick_rear_link}

      RS_FRONT_SERIAL: ${RS_FRONT_SERIAL:-}
      RS_REAR_SERIAL: ${RS_REAR_SERIAL:-}
    volumes:
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    command:
      - /start_sensors.sh
    restart: unless-stopped

  floribot-webteleop:
    profiles: ["webteleop"]
    build:
      context: ..
      dockerfile: webteleop/Dockerfile
    container_name: floribot-webteleop
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    restart: unless-stopped

  floribot-stage:
    profiles: ["stage"]
    build:
      context: ..
      dockerfile: stage/Dockerfile
    container_name: floribot-stage
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped

  floribot-gazebo:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-gazebo
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    restart: unless-stopped

  floribot-sim-backend:
    profiles: ["sim"]
    build:
      context: ..
      dockerfile: gazebo/Dockerfile
    container_name: floribot-sim-backend
    network_mode: host
    ipc: host
    pid: host
    depends_on:
      - floribot-base-sim
      - floribot-gazebo
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: 1
      GZ_SIM_RESOURCE_PATH: /ws/src/floribot_gz_description:/ws/src/floribot_gz_description/meshes
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command:
      - bash
      - -lc
      - |
          source /ws/install/setup.bash

          ros2 run ros_gz_bridge parameter_bridge \
            /sim/joint_frontLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_frontRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearLeft/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sim/joint_rearRight/cmd_vel@std_msgs/msg/Float64@gz.msgs.Double \
            /sensors/scan_front@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/scan_rear@sensor_msgs/msg/LaserScan@gz.msgs.LaserScan \
            /sensors/front_camera/image@sensor_msgs/msg/Image@gz.msgs.Image \
            /sensors/rear_camera/image@sensor_msgs/msg/Image@gz.msgs.Image &

          exec ros2 run sim_backend sim_backend_node
    restart: unless-stopped

  floribot-tasks:
    profiles: ["sim", "stage", "tasks", "robot"]
    build:
      context: ..
      dockerfile: tasks/Dockerfile
    container_name: floribot-tasks
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}
    command:
      - bash
      - -lc
      - |
          exec ros2 launch maize_navigation maize_navigation.launch.py
    restart: unless-stopped
